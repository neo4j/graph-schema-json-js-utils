name: Validate npm Trusted Provider

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC handshake

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm CLI
        run: npm install -g npm@11.5.1

      - name: Verify npm version
        run: npm --version # Using npm 11.x for OIDC provenance support

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test Authentication - graph-schema-utils (Dry Run)
        run: npm publish --dry-run --provenance --tag next
        working-directory: packages/graph-schema-utils
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Test Authentication - introspection (Dry Run)
        run: npm publish --dry-run --provenance --tag next
        working-directory: packages/introspection
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Test Authentication - json-schema (Dry Run)
        run: npm publish --dry-run --provenance --tag next
        working-directory: packages/json-schema
        env:
          NPM_CONFIG_PROVENANCE: true


